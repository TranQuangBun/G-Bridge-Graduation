services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: gbridge-mysql
    restart: unless-stopped
    environment:
      # MySQL Root User
      MYSQL_ROOT_PASSWORD: rootpassword
      
      # Database Configuration
      MYSQL_DATABASE: gbridge_db
      MYSQL_USER: gbridge_user
      MYSQL_PASSWORD: gbridge_password
      
      # MySQL Charset Configuration (required for TypeORM auto-create tables)
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      # Check if MySQL is ready and can accept connections
      # Note: Init scripts may fail if tables don't exist yet (they're created by TypeORM),
      # but MySQL will still be healthy and ready for connections
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -prootpassword || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s  # Give MySQL more time to initialize (including init scripts)
    networks:
      - gbridge-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development  # Use development stage for hot reload
    container_name: gbridge-backend
    restart: unless-stopped
    environment:
      # Node.js Environment (REQUIRED for auto-create tables)
      # When NODE_ENV=development, TypeORM will automatically create/update tables from entities
      - NODE_ENV=development
      
      # Database Configuration (MySQL service name in Docker network)
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=gbridge_db
      - DB_USER=gbridge_user
      - DB_PASSWORD=gbridge_password
      
      # JWT Authentication
      - JWT_SECRET=gbridge-super-secret-jwt-key-2025-change-in-production
      
      # Server Configuration
      - PORT=4000
      
      # CORS Configuration (Frontend URL for CORS)
      # Note: Backend now allows both localhost:3000 and localhost:3333
      - FRONTEND_URL=http://localhost:3333
      
      # ImgBB API Configuration (for file uploads)
      - IMGBB_API_KEY=939449e3cf45737142bb725ae88320a5
      
      # VNPay Configuration (Payment Gateway)
      # Lưu ý: Cần đăng ký tài khoản VNPay sandbox tại https://sandbox.vnpayment.vn/
      # và lấy VNP_TMN_CODE và VNP_HASH_SECRET từ dashboard
      # Tạo file docker-compose.override.yml để cấu hình credentials (file này được gitignore)
      - VNP_TMN_CODE=HZO7L9T6
      - VNP_HASH_SECRET=5UIIVIR2F4DOLI41JIYN1C0V4O3HAU9H
      - VNP_URL=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      - VNP_RETURN_URL=http://localhost:3333/payment/vnpay/callback
      - VNP_IPN_URL=http://localhost:4000/api/payments/webhook/vnpay
      
      # MoMo Configuration (Payment Gateway)
      # Lưu ý: Cần đăng ký tài khoản MoMo tại https://developers.momo.vn/
      # và lấy MOMO_PARTNER_CODE, MOMO_ACCESS_KEY, MOMO_SECRET_KEY từ dashboard
      # Tạo file docker-compose.override.yml để cấu hình credentials (file này được gitignore)
      # Giá trị mặc định dưới đây là sandbox credentials
      # Note: MOMO_NOTIFY_URL dùng localhost cho development (MoMo không thể gọi được)
      # Payment verification sẽ được xử lý qua MOMO_RETURN_URL callback
      - MOMO_PARTNER_CODE=MOMOBKUN20180529
      - MOMO_ACCESS_KEY=klm05TvNBzhg7h7j
      - MOMO_SECRET_KEY=at67qH6mk8w5Y1nAyMoYKMWACiEi2bsa
      - MOMO_API_URL=https://test-payment.momo.vn/v2/gateway/api/create
      - MOMO_RETURN_URL=http://localhost:3333/payment/momo/callback
      - MOMO_NOTIFY_URL=http://localhost:4000/api/payments/webhook/momo
      - MOMO_ENVIRONMENT=sandbox
      
      # AI Service Configuration
      - AI_SERVICE_URL=http://ai-service:5000
      
      # Admin Configuration (REQUIRED for admin account creation)
      # Set these values to create admin account automatically on startup
      # IMPORTANT: Change these values in production for security!
      - ADMIN_EMAIL=admin@gbridge.com
      - ADMIN_PASSWORD=Admin123!
      - ADMIN_NAME=System Administrator
    ports:
      - "4000:4000"
    volumes:
      # Mount source code for hot reload (all source files)
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
      # Mount package.json for dependency changes
      - ./backend/package.json:/app/package.json:ro
      # Exclude node_modules from mount (use container's node_modules)
      - backend_node_modules:/app/node_modules
    depends_on:
      mysql:
        condition: service_healthy  # Wait for MySQL to be healthy before starting
    networks:
      - gbridge-network
    # Healthcheck to ensure backend is ready and database connection is working
    # Check HTTP 200 status and response contains "healthy"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --timeout=5 --tries=1 http://localhost:4000/health 2>&1 | grep -q '200 OK' && wget --quiet -O - --timeout=5 http://localhost:4000/health | grep -q '\"status\":\"healthy\"'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s  # Give backend time to connect to DB and create tables
    command: npm run dev

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development  # Use development stage for hot reload
    container_name: gbridge-frontend
    restart: unless-stopped
    environment:
      # API Configuration
      # Lưu ý: React app chạy trong browser (host), không phải trong container
      # Browser không biết Docker service names, nên cần dùng localhost:4000
      # Backend container expose port 4000 ra host, nên browser có thể kết nối
      # Nếu muốn dùng service name trong Docker network, cần API proxy hoặc SSR
      - REACT_APP_API_URL=http://localhost:4000/api
      
      # Alternative: Nếu muốn dùng service name (chỉ cho server-side/SSR):
      # - REACT_APP_API_URL_INTERNAL=http://backend:4000/api
      
      # React Development Server Configuration
      - CHOKIDAR_USEPOLLING=true      # Enable file watching in Docker
      - WATCHPACK_POLLING=true        # Enable webpack polling
      - FAST_REFRESH=true             # Enable React Fast Refresh
      - GENERATE_SOURCEMAP=true       # Generate source maps for debugging
      - HOST=0.0.0.0                  # Allow external connections
      - WDS_SOCKET_HOST=localhost    # Webpack Dev Server socket host
      - WDS_SOCKET_PORT=3333          # Webpack Dev Server socket port
      
      # Optional: React App Environment
      # - REACT_APP_ENV=development
    ports:
      - "3333:3000"
    volumes:
      # Mount source code for hot reload
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      # Mount package.json for dependency changes
      - ./frontend/package.json:/app/package.json:ro
      # Exclude node_modules from mount to avoid conflicts
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy  # Wait for backend to be healthy before starting
    networks:
      - gbridge-network
    stdin_open: true
    tty: true
    command: npm start

  # AI Matching Service (Python FastAPI)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: gbridge-ai-service
    restart: unless-stopped
    environment:
      # OpenAI Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY:-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}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      
      # Service Configuration
      - API_PORT=5000
      - API_HOST=0.0.0.0
      - LOG_LEVEL=INFO
      
      # CORS Configuration
      - ALLOWED_ORIGINS=http://localhost:4000,http://localhost:3333
    ports:
      - "5000:5000"
    volumes:
      # Mount source code for hot reload
      - ./ai-service/app:/app/app
    networks:
      - gbridge-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --timeout=5 --tries=1 http://localhost:5000/api/v1/health 2>&1 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local

networks:
  gbridge-network:
    driver: bridge

