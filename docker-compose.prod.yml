# ============================================
# Docker Compose for Production
# ============================================
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
# 
# This file overrides docker-compose.yml for production builds
# using multi-stage Dockerfiles with production targets

services:
  # Backend API - Production
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production  # Use production stage
    container_name: gbridge-backend-prod
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=gbridge_db
      - DB_USER=gbridge_user
      - DB_PASSWORD=gbridge_password
      - JWT_SECRET=gbridge-super-secret-jwt-key-2025-change-in-production
      - PORT=4000
      - FRONTEND_URL=http://localhost
    ports:
      - "4000:4000"
    command: npm start  # Use production command
    # Remove volume mounts for production (code is in image)
    volumes:
      - ./backend/uploads:/app/uploads  # Only mount uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gbridge-network
    # Healthcheck to ensure backend is ready and database connection is working
    # Check HTTP 200 status and response contains "healthy"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --timeout=5 --tries=1 http://localhost:4000/health 2>&1 | grep -q '200 OK' && wget --quiet -O - --timeout=5 http://localhost:4000/health | grep -q '\"status\":\"healthy\"'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s  # Give backend time to connect to DB

  # Frontend React App - Production
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production  # Use production stage with nginx
    ports:
      - "80:80"  # nginx runs on port 80
    # Remove volume mounts for production (code is in image)
    volumes: []
    depends_on:
      - backend

